name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main        # 每次推送到 main 分支时自动触发
  workflow_dispatch: # 也可以在 GitHub 网页上手动触发

# 允许 workflow 写入 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只运行一个部署，避免冲突
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # 如果你的仓库名不是根域名，需要设置 basePath
          # 例如仓库叫 my-nextra，则设置为 /my-nextra
          # 如果用自定义域名则不需要这个
          NEXT_PUBLIC_BASE_PATH: ""

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out   # Next.js 静态导出的输出目录

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
